{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <a href="{{ url_for('recipe.detail', id=recipe.id) }}" class="btn btn-outline-secondary btn-sm">&larr; 回食譜</a>
            <h4 class="mb-0 text-success">🛒 採買模式</h4>
            <div style="width: 70px;"></div> <!-- Placeholder for alignment -->
        </div>

        <div class="card shadow-sm border-success">
            <div class="card-header bg-success text-white">
                <h5 class="card-title mb-0">{{ recipe.title }} - 食材清單</h5>
            </div>
            <div class="card-body p-4 fs-5" style="white-space: pre-wrap;">{{ recipe.ingredients }}</div>
            <div class="card-footer bg-white text-center">
                <p class="text-muted small mb-0">💡 提示：您可以使用手機瀏覽器截圖，或直接看著本頁面採買。</p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
