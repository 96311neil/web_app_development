{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="card shadow-sm">
            <div class="card-header bg-white">
                <h3 class="card-title mb-0">{% if action == 'create' %}新增食譜{% else %}編輯食譜{% endif %}</h3>
            </div>
            <div class="card-body p-4">
                <form action="{% if action == 'create' %}{{ url_for('recipe.create') }}{% else %}{{ url_for('recipe.update', id=recipe.id) }}{% endif %}" method="POST">
                    
                    <div class="mb-3">
                        <label for="title" class="form-label text-danger">食譜名稱 *</label>
                        <input type="text" class="form-control" id="title" name="title" value="{{ recipe.title if recipe else '' }}" required>
                    </div>

                    <div class="mb-3">
                        <label for="source_url" class="form-label">參考來源 (網址)</label>
                        <input type="url" class="form-control" id="source_url" name="source_url" value="{{ recipe.source_url if recipe else '' }}">
                    </div>

                    <div class="mb-3">
                        <label for="tags" class="form-label">標籤分類 (請以逗號 , 分隔)</label>
                        <input type="text" class="form-control" id="tags" name="tags" value="{{ recipe.tags_string if recipe else '' }}" placeholder="例如：晚餐, 減脂, 甜點">
                        <div class="form-text">現有標籤參考：{% for tag in tags %}{{ tag.name }}{% if not loop.last %}, {% endif %}{% endfor %}</div>
                    </div>

                    <div class="row mb-3">
                        <div class="col-md-5">
                            <label for="ingredients" class="form-label text-danger">食材清單 *</label>
                            <textarea class="form-control" id="ingredients" name="ingredients" rows="8" required placeholder="蘋果 1 顆&#10;水 500ml">{{ recipe.ingredients if recipe else '' }}</textarea>
                        </div>
                        <div class="col-md-7 mt-3 mt-md-0">
                            <label for="steps" class="form-label text-danger">製作步驟 *</label>
                            <textarea class="form-control" id="steps" name="steps" rows="8" required placeholder="1. 把水煮滾&#10;2. 切蘋果">{{ recipe.steps if recipe else '' }}</textarea>
                        </div>
                    </div>

                    <div class="mb-4">
                        <label for="personal_note" class="form-label">個人筆記與調整</label>
                        <textarea class="form-control" id="personal_note" name="personal_note" rows="3" placeholder="例如：糖可以少放一半、烤箱要先預熱">{{ recipe.personal_note if recipe else '' }}</textarea>
                    </div>

                    <div class="d-flex justify-content-between">
                        <a href="{% if action == 'edit' %}{{ url_for('recipe.detail', id=recipe.id) }}{% else %}{{ url_for('recipe.index') }}{% endif %}" class="btn btn-outline-secondary">取消</a>
                        <button type="submit" class="btn btn-primary px-4">儲存食譜</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
